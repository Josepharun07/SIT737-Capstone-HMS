version: '3.8'

services:
  # === 1. DATABASE ===
  postgres:
    image: postgres:16-alpine
    container_name: hms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-blueberry_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blueberry123}
      POSTGRES_DB: ${DB_NAME:-blueberry_hms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blueberry_network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U blueberry_admin -d blueberry_hms"
      interval: 10s
      timeout: 5s
      retries: 5

  # === 2. BACKEND API ===
  api-core:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: hms_api_core
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-blueberry_admin}
      DB_PASSWORD: ${DB_PASSWORD:-blueberry123}
      DB_NAME: ${DB_NAME:-blueberry_hms}
      JWT_SECRET: ${JWT_SECRET:-blueberry_super_secret_key_capstone_2024}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blueberry_network

  # === 3. FRONTEND ADMIN PANEL ===
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: hms_admin_panel
    restart: unless-stopped
    ports:
      - "8080:80" # Maps local port 8080 to container port 80 (Nginx)
    depends_on:
      - api-core
    networks:
      - blueberry_network

networks:
  blueberry_network:
    driver: bridge

volumes:
  postgres_data: