name: Blueberry HMS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4   # <-- Upgraded to v4 to fix Node.js warning

      - name: Log in to Docker Hub
        uses: docker/login-action@v3  # <-- Upgraded to v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Core
        uses: docker/build-push-action@v5  # <-- Upgraded to v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/capstone-api:latest

      - name: Build and Push Admin Panel
        uses: docker/build-push-action@v5  # <-- Upgraded to v5
        with:
          context: .
          file: ./Dockerfile.admin
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/capstone-admin:latest