name: Blueberry HMS CI/CD Pipeline

on:
  push:
    branches:
      - main # Triggers the pipeline every time you push to main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Core
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          # IT WILL AUTOMATICALLY USE YOUR USERNAME SECRET HERE
          tags: ${{ secrets.DOCKER_USERNAME }}/capstone-api:latest

      - name: Build and Push Admin Panel
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.admin
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/capstone-admin:latest